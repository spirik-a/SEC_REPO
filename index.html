<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>СПІРІДОНОВ АНДРІЙ | ТЕСТОВЕ ЗАВДАННЯ</title>
    <style>
      body {
        background-color: #0d0e12;
        color: #ffffff;
        font-family: "Inter", sans-serif;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        -webkit-user-select: none;
        -moz-user-select: none;
        -ms-user-select: none;
        user-select: none;
      }

      .main-header {
        text-align: center;
        padding: 50px 20px;
        background: linear-gradient(180deg, #1a1c24 0%, #0d0e12 100%);
        width: 100%;
        border-bottom: 1px solid #2d2f36;
      }

      .main-header h1 {
        font-size: 22px;
        letter-spacing: 2px;
        color: #7c4dff;
        margin: 0;
        text-transform: uppercase;
      }

      .container {
        max-width: 800px;
        width: 90%;
        padding: 30px 0;
      }

      .case-block {
        margin-bottom: 60px;
        background: #16181d;
        border-radius: 24px;
        padding: 25px;
        border: 1px solid #2d2f36;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .variant-title {
        color: #7c4dff;
        font-size: 13px;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 15px;
        font-weight: bold;
      }

      .visual-content {
        position: relative;
        display: flex;
        justify-content: center;
        border-radius: 16px;
        overflow: hidden;
        box-shadow: 0 15px 30px rgba(0, 0, 0, 0.5);
        max-width: 360px;
        width: 100%;
        border: 1px solid #333;
        background: #000;
      }

      img {
        width: 100%;
        height: auto;
        display: block;
        -webkit-user-drag: none;
      }

      video {
        width: 100%;
        height: auto;
        display: block;
        pointer-events: auto; /* Дозволяє клікати на кнопки плеєра */
        -webkit-user-drag: none;
      }

      footer {
        padding: 30px;
        color: #4a4d55;
        font-size: 11px;
        text-align: center;
      }
    </style>
  </head>
  <body oncontextmenu="return false;">
    <div class="main-header">
      <h1>СПІРІДОНОВ АНДРІЙ</h1>
      <p
        style="
          margin-top: 8px;
          color: #888;
          font-size: 14px;
          letter-spacing: 1px;
        "
      >
        ВИКОНАНЕ ТЕСТОВЕ ЗАВДАННЯ
      </p>
    </div>

    <div class="container">
      <div class="case-block">
        <div class="variant-title">КЕРУВАННЯ ПЛЕЄРОМ ДОСТУПНЕ ВНИЗУ ВІДЕО</div>
        <h6>ТАК ЯК ПЕРША СЦЕНА ЧОРНА, ЩОБ ПОБАЧИТИ НАТИСНІТЬ ПРОГРАВАТИ</h6>

        <div class="visual-content video-container">
          <video
            autoplay
            playsinline
            disablePictureInPicture
            controls
            controlsList="nodownload"
          >
            <source src="1RD_TOON_STATION_TEST_TASK.mp4" type="video/mp4" />
          </video>
        </div>
      </div>
    </div>

    <footer>&copy; 2026 Андрій Спірідонов. Всі права захищені.</footer>

    <script>
      // Захист коду сторінки та блокування інспектора
      document.onkeydown = function (e) {
        if (
          e.ctrlKey &&
          (e.keyCode === 83 ||
            e.keyCode === 85 ||
            e.keyCode === 123 ||
            e.keyCode === 73)
        ) {
          return false;
        }
      };

      document.querySelectorAll(".video-container").forEach((container) => {
        const video = container.querySelector("video");

        // Зупинка відео за 0.8 сек до кінця на потрібному кадрі
        video.addEventListener("timeupdate", () => {
          if (video.duration && video.currentTime >= video.duration - 0.8) {
            video.pause();
            video.currentTime = video.duration - 0.8;
          }
        });

        // Якщо відео додивилися до кінця і знову тиснуть плей — воно почнеться спочатку
        video.addEventListener("play", () => {
          if (video.currentTime >= video.duration - 0.85) {
            video.currentTime = 0;
          }
        });
      });
    </script>
  </body>
</html>
